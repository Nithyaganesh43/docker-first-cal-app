version: "3.9"

services:
  backend:
    image: nithyaganesh4343/backend:latest
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - app-network
    restart: always

  mongo:
    image: mongo:6
    env_file:
      - .env
    volumes:
      - mongo-data:/data/db
    networks:
      - app-network
    restart: always

  frontend:
    image: nithyaganesh4343/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: always

volumes:
  mongo-data:

networks:
  app-network:
    driver: bridge