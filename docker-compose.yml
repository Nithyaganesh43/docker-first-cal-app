services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017
      - DB_NAME=calculator
    depends_on:
      - mongo
  mongo:
    image: mongo:6
    environment:
      - MONGO_INITDB_DATABASE=calculator
    volumes:
      - mongo-data:/data/db
  frontend:
    build: ./frontend
    ports:
      - "3000:80" 
    depends_on:
      - backend
volumes:
  mongo-data: