name: CI/CD Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - working-directory: ./Backend
        run: npm ci

      - working-directory: ./Backend
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - working-directory: ./Frontend
        run: npm ci

      - working-directory: ./Frontend
        run: npm run build

  build-and-push:
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Backend
        run: |
          docker build -t nithyaganesh4343/backend:${IMAGE_TAG} ./Backend
          docker tag nithyaganesh4343/backend:${IMAGE_TAG} nithyaganesh4343/backend:latest
          docker push nithyaganesh4343/backend:${IMAGE_TAG}
          docker push nithyaganesh4343/backend:latest

      - name: Build & Push Frontend
        run: |
          docker build -t nithyaganesh4343/frontend:${IMAGE_TAG} ./Frontend
          docker tag nithyaganesh4343/frontend:${IMAGE_TAG} nithyaganesh4343/frontend:latest
          docker push nithyaganesh4343/frontend:${IMAGE_TAG}
          docker push nithyaganesh4343/frontend:latest

      - name: Deploy to EC2 (with rollback + health check)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd ~/docker-first-cal-app

            echo "🚀 Starting deployment..."

            # Ensure Docker is running
            sudo systemctl start docker

            # Backup current image IDs (for rollback)
            PREV_BACKEND_IMAGE="$(sudo docker inspect --format='{{.Image}}' docker-first-cal-app-backend-1 2>/dev/null || true)"
            PREV_FRONTEND_IMAGE="$(sudo docker inspect --format='{{.Image}}' docker-first-cal-app-frontend-1 2>/dev/null || true)"

            # Create .env safely
            cat <<EOF > .env
            PORT=${{ secrets.PORT }}
            MONGO_URI=${{ secrets.MONGO_URI }}
            DB_NAME=${{ secrets.MONGO_INITDB_DATABASE }}
            COLLECTION_NAME=history
            MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }}
            MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}
            MONGO_INITDB_DATABASE=${{ secrets.MONGO_INITDB_DATABASE }}
            EOF

            # Pull latest images
            sudo docker compose pull

            # Deploy new version
            sudo docker compose up -d --remove-orphans

            echo "⏳ Waiting for services and validating health..."

            # Health check against exposed frontend route that depends on backend.
            # Retry because MongoDB/backend may need extra startup time.
            HEALTH_OK=0
            for i in $(seq 1 12); do
              if curl -fsS http://localhost/api/history >/dev/null; then
                HEALTH_OK=1
                break
              fi
              sleep 5
            done

            if [ "$HEALTH_OK" -ne 1 ]; then
              echo "❌ Health check failed. Rolling back..."

              # Rollback using previously running image IDs.
              # This only runs when both previous images were detected.
              if [ -n "$PREV_BACKEND_IMAGE" ] && [ -n "$PREV_FRONTEND_IMAGE" ]; then
                cat <<EOF > rollback.override.yml
                services:
                  backend:
                    image: $PREV_BACKEND_IMAGE
                  frontend:
                    image: $PREV_FRONTEND_IMAGE
                EOF

                sudo docker compose -f docker-compose.yml -f rollback.override.yml up -d --remove-orphans || true
              fi

              sudo docker compose ps
              sudo docker compose logs --tail=120 backend frontend mongo || true

              exit 1
            fi

            echo "✅ Deployment successful!"