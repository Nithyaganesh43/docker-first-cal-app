name: CI/CD Pipeline

on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Backend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./Backend
        run: npm ci

      - name: Run backend tests
        working-directory: ./Backend
        run: npm test

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: ./Frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./Frontend
        run: npm run build

  build-and-push:
    needs: [backend-tests, frontend-build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t nithyaganesh4343/backend:latest ./Backend

      - name: Build frontend image
        run: docker build -t nithyaganesh4343/frontend:latest ./Frontend

      - name: Push backend image
        run: docker push nithyaganesh4343/backend:latest

      - name: Push frontend image
        run: docker push nithyaganesh4343/frontend:latest

      - name: Deploy to EC2 (with secrets)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/docker-first-cal-app

            echo "PORT=${{ secrets.PORT }}" > .env
            echo "MONGO_URI=${{ secrets.MONGO_URI }}" >> .env
            echo "MONGO_INITDB_ROOT_USERNAME=${{ secrets.MONGO_INITDB_ROOT_USERNAME }}" >> .env
            echo "MONGO_INITDB_ROOT_PASSWORD=${{ secrets.MONGO_INITDB_ROOT_PASSWORD }}" >> .env
            echo "MONGO_INITDB_DATABASE=${{ secrets.MONGO_INITDB_DATABASE }}" >> .env

            docker-compose pull
            ddocker-compose up -d --remove-orphans