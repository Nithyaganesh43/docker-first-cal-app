name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]


jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build backend image
        run: docker build -t nithyaganesh4343/backend:latest ./Backend

      - name: Build frontend image
        run: docker build -t nithyaganesh4343/frontend:latest ./Frontend

      - name: Push backend image
        run: docker push nithyaganesh4343/backend:latest

      - name: Push frontend image
        run: docker push nithyaganesh4343/frontend:latest

      - name: Deploy to EC2 
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/docker-first-cal-app
            docker-compose pull
            docker-compose down
            docker-compose up -d