server {
  listen 80;

  # API routing
  location /api/ {
    rewrite ^/api/(.*)$ /$1 break;

    proxy_pass http://backend:5000;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
  }

  # frontend
  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri /index.html;
  }
}